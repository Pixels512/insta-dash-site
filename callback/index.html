<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insta Dash Publisher - Authorization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 520px; width: 90%; background: #1a1a2e; border-radius: 16px; padding: 48px 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 14px; }
    .status { padding: 20px; border-radius: 12px; margin-bottom: 24px; }
    .status.success { background: rgba(108, 92, 231, 0.15); border: 1px solid rgba(108, 92, 231, 0.3); }
    .status.error { background: rgba(231, 76, 60, 0.15); border: 1px solid rgba(231, 76, 60, 0.3); }
    .status.loading { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    .code-box { background: #0f0f1a; border-radius: 8px; padding: 16px; font-family: 'SF Mono', Monaco, monospace; font-size: 13px; word-break: break-all; color: #6C5CE7; margin-top: 12px; text-align: left; position: relative; cursor: pointer; border: 1px solid rgba(108, 92, 231, 0.2); }
    .code-box:hover { border-color: rgba(108, 92, 231, 0.5); }
    .copy-hint { font-size: 11px; color: #666; margin-top: 8px; }
    .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .copied { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #6C5CE7; color: white; padding: 8px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .copied.show { opacity: 1; }
    p { line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="icon">🔄</div>
    <h1>Processing Authorization...</h1>
    <div class="status loading">
      <p>Reading TikTok response...</p>
    </div>
  </div>
  <div class="copied" id="copied">Copied!</div>

  <script>
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const errorDescription = params.get('error_description');
    const state = params.get('state');

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const el = document.getElementById('copied');
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1500);
      });
    }

    if (code) {
      app.innerHTML = `
        <div class="icon">✅</div>
        <h1>Authorization Successful</h1>
        <p class="subtitle">TikTok account connected to Insta Dash Publisher</p>
        <div class="status success">
          <div class="label">Authorization Code</div>
          <div class="code-box" onclick="copyToClipboard('${code}')">${code}</div>
          <div class="copy-hint">Click to copy</div>
          ${state ? `<div style="margin-top:16px"><div class="label">State</div><div class="code-box" onclick="copyToClipboard('${state}')">${state}</div></div>` : ''}
        </div>
        <p style="font-size:13px;color:#888;">You can close this window. Your TikTok account is now linked.</p>
      `;
    } else if (error) {
      app.innerHTML = `
        <div class="icon">❌</div>
        <h1>Authorization Failed</h1>
        <p class="subtitle">TikTok did not grant access</p>
        <div class="status error">
          <p><strong>Error:</strong> ${error}</p>
          ${errorDescription ? `<p style="margin-top:8px;font-size:13px;">${errorDescription}</p>` : ''}
        </div>
        <p style="font-size:13px;color:#888;margin-top:16px;">Please try again from the Insta Dash dashboard.</p>
      `;
    } else {
      app.innerHTML = `
        <div class="icon">⚠️</div>
        <h1>No Authorization Data</h1>
        <p class="subtitle">This page handles TikTok OAuth callbacks</p>
        <div class="status loading">
          <p>If you were trying to connect your TikTok account, please start the process from the <a href="https://pixels512.github.io/insta-dash-site/" style="color:#6C5CE7;">Insta Dash dashboard</a>.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
